<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso · TOTEM</title>
  <link rel="stylesheet" href="css/styles.css?v=20260526" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-app);
    }
    .login-shell {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
    .login-card {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg);
      padding: 40px 36px;
    }
    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 28px;
    }
    .login-brand .brand-mark {
      width: 56px; height: 56px;
      font-size: 24px;
    }
    .login-brand h1 {
      font-size: 22px;
      letter-spacing: -0.02em;
    }
    .login-brand .subtitle {
      color: var(--text-secondary);
      font-size: 13px;
      margin: 0;
    }
    .error-box {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--accent-error);
      padding: 10px 12px;
      border-radius: var(--r-md);
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
    }
    .error-box.show { display: block; }
    .login-foot {
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      margin-top: 16px;
    }
    .login-theme-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
    }
  </style>
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-mark">T</div>
      <div style="text-align:center;">
        <h1>TOTEM</h1>
        <p class="subtitle">Cotizador de Control de Combustible</p>
      </div>
    </div>

    <div id="login-error" class="error-box"></div>

    <form id="login-form" autocomplete="off">
      <div class="field">
        <label for="usuario">Usuario o email</label>
        <input id="usuario" type="text" placeholder="usuario@empresa.com" required autofocus />
      </div>
      <div class="field" style="margin-bottom: 24px;">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="login-btn">
        Ingresar
      </button>
    </form>

    <div class="login-foot">
      ¿Olvidaste tu contraseña? Pide al administrador que la reinicie.
    </div>
  </div>

  <div style="text-align:center;margin-top:16px;color:var(--text-muted);font-size:11px;">
    © 2025 TOTEM · v6
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=20260526"></script>
<script src="js/auth.js?v=20260526"></script>
<script src="js/icons.js?v=20260526"></script>
<script src="js/theme.js?v=20260526"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // Si ya hay sesión activa, redirigir al dashboard
    const session = await currentSession();
    if (session) {
      window.location.href = 'index.html';
      return;
    }

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Verificando…';

      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;

      try {
        const result = await login(usuario, password);
        if (result.ok) {
          window.location.href = 'index.html';
        } else {
          errorBox.textContent = result.error || 'Usuario o contraseña incorrectos';
          errorBox.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      } catch (err) {
        console.error(err);
        errorBox.textContent = 'Error de conexión. Reintenta.';
        errorBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  });
</script>

</body>
</html>
