<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión · TOTEM</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-hot), var(--accent-cool));
    }
    .login-header {
      padding: 48px 40px 32px;
      text-align: center;
    }
    .login-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-brand .brand-mark {
      width: 44px; height: 44px;
      font-size: 18px;
    }
    .login-brand .brand-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 26px;
    }
    .login-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-hot);
      margin-bottom: 8px;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .login-sub {
      color: var(--text-secondary);
      font-size: 13px;
    }
    .login-form {
      padding: 0 40px 40px;
    }
    .login-form .field {
      margin-bottom: 16px;
    }
    .login-form input {
      font-size: 15px;
      padding: 12px 14px;
    }
    .login-error {
      background: rgba(207, 70, 71, 0.1);
      border: 1px solid var(--accent-err);
      color: var(--accent-err);
      padding: 10px 14px;
      border-radius: var(--r-md);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-error.show { display: block; }
    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 14px;
      justify-content: center;
      margin-top: 8px;
    }
    .login-footer {
      padding: 24px 40px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }
    .login-footer strong {
      color: var(--text-secondary);
    }
    .login-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-brand">
        <div class="brand-mark">T</div>
        <div class="brand-name">TOTEM</div>
      </div>
      <div class="login-eyebrow">Cotizador · Control de Combustible</div>
      <h1 class="login-title">Iniciar sesión</h1>
      <div class="login-sub">Ingresa tus credenciales para acceder al sistema</div>
    </div>

    <form class="login-form" id="login-form" onsubmit="return false;">
      <div class="login-error" id="login-error"></div>

      <div class="field">
        <label for="inp-username">Usuario</label>
        <input type="text" id="inp-username" class="mono" autocomplete="username" autofocus required placeholder="ej: admin">
      </div>

      <div class="field">
        <label for="inp-password">Contraseña</label>
        <input type="password" id="inp-password" autocomplete="current-password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn btn-primary login-btn" id="btn-login">
        <span id="btn-login-text">Entrar</span>
      </button>
    </form>

    <div class="login-footer">
      ¿Olvidaste tu contraseña? Contacta al <strong>administrador</strong>.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Si ya hay sesión activa, redirigir al dashboard
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.replace('index.html');
      }
    })();

    const form = document.getElementById('login-form');
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');
    const btnTxt = document.getElementById('btn-login-text');

    async function intentarLogin() {
      errEl.classList.remove('show');
      const username = document.getElementById('inp-username').value.trim();
      const password = document.getElementById('inp-password').value;
      if (!username || !password) {
        errEl.textContent = 'Ingresa usuario y contraseña.';
        errEl.classList.add('show');
        return;
      }
      btn.disabled = true;
      btnTxt.innerHTML = '<span class="login-spinner"></span> Entrando...';

      const res = await login(username, password);
      if (res.ok) {
        window.location.replace('index.html');
      } else {
        errEl.textContent = res.error || 'Error al iniciar sesión.';
        errEl.classList.add('show');
        btn.disabled = false;
        btnTxt.textContent = 'Entrar';
        document.getElementById('inp-password').value = '';
        document.getElementById('inp-password').focus();
      }
    }

    form.addEventListener('submit', intentarLogin);
    document.getElementById('btn-login').addEventListener('click', intentarLogin);
    document.getElementById('inp-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') intentarLogin();
    });
  </script>
</body>
</html>
