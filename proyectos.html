<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyectos · TOTEM</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">T</div>
      <div class="brand-name">TOTEM</div>
      <div class="brand-tag">Cotizador · Control de Combustible</div>
    </div>
    <nav class="nav-tabs">
      <a href="index.html">Dashboard</a>
      <a href="levantamiento.html">Levantamiento</a>
      <a href="oferta.html">Cotización</a>
      <a href="proyectos.html" class="active">Proyectos</a>
      <a href="mantenimiento.html">Mantenimiento</a>
    </nav>
    <div class="user-chip"><span>Cargando...</span></div>
  </header>

  <main class="app-main">
    <div class="page-head">
      <div class="titles">
        <div class="eyebrow">Histórico</div>
        <h1>Proyectos & Cotizaciones</h1>
        <div class="subtitle">Cada edición de una oferta genera una nueva versión inmutable. Las versiones anteriores nunca se pierden.</div>
      </div>
      <div class="flex-gap" id="header-actions"></div>
    </div>

    <div id="proyectos-list">
      <div class="empty-state" style="padding:60px;">
        <p>Cargando proyectos...</p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>
    (async () => {
      const ok = await requireAuth('proyectos');
      if (!ok) return;
      aplicarPermisosNav();

      // Botón de acción según rol
      const headerActions = document.getElementById('header-actions');
      if (['admin', 'ingeniero'].includes(auth.profile.rol)) {
        headerActions.innerHTML = '<a href="levantamiento.html" class="btn btn-primary">＋ Nuevo Levantamiento</a>';
      }

      cargarProyectos();
    })();

    async function cargarProyectos() {
      // Traer todos los proyectos con sus ofertas (con la vista que ya creamos)
      const { data: ofertas, error } = await supabase
        .from('ofertas_con_version_actual')
        .select('*')
        .order('oferta_creada_en', { ascending: false });

      const cont = document.getElementById('proyectos-list');

      if (error) {
        cont.innerHTML = `<div class="empty-state" style="padding:60px;"><p>Error cargando: ${error.message}</p></div>`;
        return;
      }
      if (!ofertas || ofertas.length === 0) {
        cont.innerHTML = `
          <div class="panel">
            <div class="panel-body" style="text-align:center;padding:60px;">
              <div style="font-size:48px;opacity:0.4;margin-bottom:16px;">▱</div>
              <h2 style="margin-bottom:12px;">No hay proyectos todavía</h2>
              <p class="text-secondary" style="margin-bottom:24px;">Cuando creen levantamientos y se generen ofertas, aparecerán aquí agrupados por proyecto y cliente.</p>
              <a href="levantamiento.html" class="btn btn-primary">＋ Crear primer levantamiento</a>
            </div>
          </div>`;
        return;
      }

      // Agrupar por proyecto
      const porProyecto = {};
      ofertas.forEach(o => {
        if (!porProyecto[o.proyecto_id]) {
          porProyecto[o.proyecto_id] = {
            proyecto_id: o.proyecto_id,
            proyecto_nombre: o.proyecto_nombre,
            cliente_nombre: o.cliente_nombre,
            ofertas: [],
          };
        }
        porProyecto[o.proyecto_id].ofertas.push(o);
      });

      const badgeEstado = {
        borrador: 'badge-draft',
        en_revision: 'badge-draft',
        aprobada: 'badge-approved',
        enviada: 'badge-approved',
        rechazada: 'badge-archived',
        archivada: 'badge-archived',
      };

      cont.innerHTML = Object.values(porProyecto).map((p, idx) => `
        <div class="panel" style="margin-bottom:24px;">
          <div class="panel-head">
            <h3><span class="num">P${idx + 1}</span> ${p.cliente_nombre} · <span class="text-secondary" style="font-weight:400;font-size:14px;">${p.proyecto_nombre}</span></h3>
            <span class="text-muted mono" style="font-size:11px;">${p.ofertas.length} ofertas · ${p.ofertas.reduce((s, o) => s + (o.total_versiones || 1), 0)} versiones</span>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Referencia</th>
                <th>Versión</th>
                <th>Estado</th>
                <th>Última modif.</th>
                <th class="money">PVP</th>
              </tr>
            </thead>
            <tbody>
              ${p.ofertas.map(o => `
                <tr>
                  <td class="mono">${o.codigo}</td>
                  <td>${o.referencia || '—'}</td>
                  <td><span class="badge badge-v">v${o.version_actual}</span> <span class="text-muted" style="font-size:11px;">(${o.total_versiones} total)</span></td>
                  <td><span class="badge ${badgeEstado[o.oferta_estado] || 'badge-v'}">${o.oferta_estado}</span></td>
                  <td class="mono text-muted" style="font-size:12px;">${o.version_creada_en ? new Date(o.version_creada_en).toLocaleDateString('es-EC') : '—'}</td>
                  <td class="money">$${Number(o.total || 0).toLocaleString('es-EC', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
